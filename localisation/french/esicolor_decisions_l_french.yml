 esicolor_general_recruitment:0 "Foreign Commander Recruitment"
 esicolor_general_recruitment_desc:0 "The Great Collapse brought many people into the field of military leadership. As our control expands, we can look into recruiting people who have previously served under other warlords in order to gain experienced commanders to lead our armies or navies, even if some might've previously fought against us.[esicolor_general_recruitment_get_priority]"
 esicolor_general_recruitment_named_only_desc:0 "\n\nWe are currently only looking for people with pre-Collapse military experience."
 esicolor_general_recruitment_named_prioritised_desc:0 "\n\nWe are currently prioritisng people with pre-Collapse military experience."
 esicolor_general_recruitment_no_priority_desc:0 "\n\nWe are currently looking for current skills, not necessarily pre-Collapse military experience."
 foreign_generals_named_only:0 "Limit recruitment to pre-Collapse military personnel"
